name: Deploy FoxChat

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout / Update code
        run: |
          if [ -d .git ]; then
            echo "Existing repo found, pulling latest..."
            git pull origin master
          else
            echo "Fresh checkout..."
            git clone http://localhost:3000/bedfox/FoxChat.git -b master .
          fi
        working-directory: ${{ github.workspace }}

      - name: Pull Ollama embedding model
        run: |
          docker exec fox-ollama ollama pull quentinz/bge-small-zh-v1.5 || echo "Model may already exist"

      - name: Build base images
        run: |
          echo "Building base images (Docker cache will skip if unchanged)..."
          docker build -f FoxChatRAG-python/Dockerfile.base -t foxchat-python-base:latest FoxChatRAG-python
          docker build -f FoxChat-vue/Dockerfile.base -t foxchat-vue-build-base:latest FoxChat-vue
          docker build -f FoxChat-java/Dockerfile.base -t foxchat-java-build-base:latest FoxChat-java

      - name: Build app images
        run: docker compose -f docker-compose.prod.yml build --parallel

      - name: Deploy containers
        run: docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

      - name: Verify deployment
        run: |
          echo "===== Container Status ====="
          docker compose -f docker-compose.prod.yml ps
          echo ""
          echo "===== Health Check ====="
          sleep 15
          curl -sf http://localhost:8000/docs > /dev/null && echo "Python RAG: OK" || echo "Python RAG: FAIL"
          curl -sf http://localhost:12000 > /dev/null && echo "Java API: OK" || echo "Java API: FAIL"
          curl -sf http://localhost:80 > /dev/null && echo "Vue frontend: OK" || echo "Vue frontend: FAIL"
