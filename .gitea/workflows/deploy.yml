name: Deploy FoxChat

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose -f docker-compose.prod.yml build --parallel

      - name: Deploy containers
        run: docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Verify deployment
        run: |
          echo "===== Container Status ====="
          docker compose -f docker-compose.prod.yml ps
          echo ""
          echo "===== Health Check ====="
          sleep 10
          curl -sf http://localhost:8000/docs > /dev/null && echo "Python RAG: OK" || echo "Python RAG: FAIL"
          curl -sf http://localhost:12000 > /dev/null && echo "Java API: OK" || echo "Java API: FAIL"
          curl -sf http://localhost:80 > /dev/null && echo "Vue frontend: OK" || echo "Vue frontend: FAIL"
