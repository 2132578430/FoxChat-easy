name: 部署 FoxChat

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: 📥 拉取最新代码
        run: |
          if [ -d .git ]; then
            echo "已有仓库，增量更新..."
            git pull origin master
          else
            echo "首次检出..."
            git clone http://localhost:3000/bedfox/FoxChat.git -b master .
          fi
        working-directory: ${{ github.workspace }}

      - name: 📦 构建基础镜像（依赖层）
        run: |
          echo "构建基础镜像（依赖未变则跳过）..."
          docker build -f FoxChatRAG-python/Dockerfile.base -t foxchat-python-base:latest FoxChatRAG-python
          docker build -f FoxChat-vue/Dockerfile.base -t foxchat-vue-build-base:latest FoxChat-vue
          docker build -f FoxChat-java/Dockerfile.base -t foxchat-java-build-base:latest FoxChat-java

      - name: 🏗️ 构建应用镜像
        run: docker compose -f docker-compose.prod.yml build --parallel

      - name: 🚀 部署容器
        run: docker compose -f docker-compose.prod.yml --env-file /root/home/docker-manager/.env up -d --remove-orphans

      - name: ✅ 健康检查
        run: |
          echo "===== 容器状态 ====="
          docker compose -f docker-compose.prod.yml ps
          echo ""
          echo "===== 中间件隧道检查 ====="
          # 检查 frp 转发的端口是否可达（frps 在本机 → 服务器端口）
          (echo > /dev/tcp/127.0.0.1/13306 && echo "🟢 MySQL 隧道: 可达") || echo "🔴 MySQL 隧道: 不可达"
          (echo > /dev/tcp/127.0.0.1/16379 && echo "🟢 Redis 隧道: 可达") || echo "🔴 Redis 隧道: 不可达"
          (echo > /dev/tcp/127.0.0.1/15672 && echo "🟢 RabbitMQ 隧道: 可达") || echo "🔴 RabbitMQ 隧道: 不可达"
          echo ""
          echo "===== 服务检查 ====="
          sleep 15
          curl -sf http://localhost:8000/docs > /dev/null && echo "🟢 Python RAG: 正常" || echo "🔴 Python RAG: 异常"
          curl -sf http://localhost:12000 > /dev/null && echo "🟢 Java API: 正常" || echo "🔴 Java API: 异常"
          curl -sf http://localhost:80 > /dev/null && echo "🟢 Vue 前端: 正常" || echo "🔴 Vue 前端: 异常"
          echo ""
          echo "===== 内存用量 ====="
          free -h

      - name: 🧹 清理旧镜像和构建缓存
        run: |
          echo "===== 磁盘用量（清理前）====="
          df -h / | grep -E "Filesystem|/dev/"
          echo ""
          # 清理悬空镜像
          docker image prune -f
          # 清理 7 天前的构建缓存（保留最近的）
          docker builder prune -f --filter "until=168h"
          # 清理未使用的卷
          docker volume prune -f
          echo ""
          echo "===== 磁盘用量（清理后）====="
          df -h / | grep -E "Filesystem|/dev/"
