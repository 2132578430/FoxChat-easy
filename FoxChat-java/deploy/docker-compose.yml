
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"

services:
  mysql:
    image: mysql:8.0
    container_name: fox-mysql
    restart: always
    logging: *default-logging
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=FoxChat
      - TZ=Asia/Shanghai
    volumes:
      - ./mysql-docker/data:/var/lib/mysql
      - ./mysql-docker/log:/var/log/mysql
      - ./mysql-docker/conf:/etc/mysql/conf.d
    ports:
      - "3306:3306"
    deploy:
      resources:
        limits:
          memory: 1G  # 限制最大内存
    networks:
      - chat

  redis:
    image: redis:latest
    container_name: fox-redis
    restart: always
    logging: *default-logging
    ports:
      - "6379:6379"
    volumes:
      - ./redis-docker/data:/data
      - ./redis-docker/conf/redis.conf:/etc/redis/redis.conf
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - TZ=Asia/Shanghai
    command: redis-server --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 256M  # 限制最大内存
    networks:
      - chat

  minio:
    image: minio/minio:latest
    container_name: fox-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio/data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: Asia/Shanghai
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 512M  # 限制最大内存
    networks:
      - chat
  nginx:
    image: nginx:latest
    container_name: fox-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/logs:/var/log/nginx
    deploy:
      resources:
        limits:
          memory: 128M  # 限制最大内存
    depends_on:
      - backend
    networks:
      - chat

  backend:
    image: eclipse-temurin:17-jdk-alpine
    container_name: fox-backend
    restart: always
    volumes:
      - ./jar/bedfox-Chat-0.0.1-SNAPSHOT.jar:/app/app.jar
      - ./logs:/logs
    # 添加 -Xmx512m 限制堆内存
    command: java -Xmx512m -jar /app/app.jar --spring.profiles.active=prod
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - TZ=Asia/Shanghai
    ports:
      - "12000:12000"
      - "13000:13000"
    deploy:
      resources:
        limits:
          memory: 800M  # 容器内存硬限制（比 JVM 堆大一些）
    depends_on:
      - mysql
      - redis
      - minio
    networks:
      - chat

networks:
  chat:
    driver: bridge
