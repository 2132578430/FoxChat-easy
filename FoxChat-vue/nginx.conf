server {
    listen 80;

    # Docker internal DNS resolver (re-resolve on each request)
    resolver 127.0.0.11 valid=30s;

    # Static files (Vue SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # Backend REST API (strip /api prefix)
    # ============================================
    location /api/ {
        set $java_api "java-app:12000";
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$java_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # WebSocket (Netty, path: /chat)
    # ============================================
    location /chat {
        set $java_ws "java-app:13000";
        proxy_pass http://$java_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ============================================
    # MinIO file access (strip /oss prefix)
    # ============================================
    location /oss/ {
        set $minio "minio:9000";
        rewrite ^/oss/(.*)$ /$1 break;
        proxy_pass http://$minio;
        proxy_set_header Host $host;
    }
}
