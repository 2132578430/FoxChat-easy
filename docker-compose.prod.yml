# ============================================
# FoxChat Production Docker Compose
# 一键启动：docker compose -f docker-compose.prod.yml --env-file /root/home/docker-manager/.env up -d
# ============================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"

services:
  # ============================================
  # Middleware (from /root/home)
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: fox-mysql
    restart: unless-stopped
    logging: *default-logging
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - TZ=Asia/Shanghai
    volumes:
      - /root/home/docker-manager/mysql-docker/data:/var/lib/mysql
      - /root/home/docker-manager/mysql-docker/log:/var/log/mysql
      - /root/home/docker-manager/mysql-docker/conf:/etc/mysql/conf.d
    ports:
      - "3306:3306"
    networks:
      - chat
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis/redis-stack:latest
    container_name: fox-redis
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - /root/home/docker-manager/redis-docker/data:/data
      - /root/home/docker-manager/redis-docker/conf/redis.conf:/etc/redis/redis.conf
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    networks:
      - chat
    deploy:
      resources:
        limits:
          memory: 96M

  minio:
    image: minio/minio:latest
    container_name: fox-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /root/home/docker-manager/minio/data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      TZ: Asia/Shanghai
    command: server /data --console-address ":9001"
    networks:
      - chat
    deploy:
      resources:
        limits:
          memory: 128M

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: fox-rabbitmq
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - /root/home/docker-manager/rabbitmq-docker/data:/var/lib/rabbitmq
      - /root/home/docker-manager/rabbitmq-docker/log:/var/log/rabbitmq
      - /root/home/docker-manager/rabbitmq-docker/conf/:/etc/rabbitmq/
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBIT_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBIT_PASSWORD:-admin}
      - TZ=Asia/Shanghai
    networks:
      - chat
    deploy:
      resources:
        limits:
          memory: 96M

  chromadb:
    image: chromadb/chroma:latest
    container_name: fox-chromadb
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "18000:8000"
    volumes:
      - /root/home/docker-manager/chroma-docker/data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - chat
    deploy:
      resources:
        limits:
          memory: 64M

  # ============================================
  # Ollama (embedding model)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: fox-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - /root/home/docker-manager/ollama-data:/root/.ollama
    environment:
      - TZ=Asia/Shanghai
    networks:
      - chat
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================
  # Application Services
  # ============================================
  java-app:
    build: ./FoxChat-java
    container_name: fox-java
    restart: unless-stopped
    ports:
      - "12000:12000"
      - "13000:13000"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/FoxChat
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=${RABBIT_USER:-admin}
      - SPRING_RABBITMQ_PASSWORD=${RABBIT_PASSWORD:-admin}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - RAG_SERVICE_URL=http://python-app:8000
      - SPRING_PROFILES_ACTIVE=prod
      - TZ=Asia/Shanghai
    depends_on:
      - mysql
      - redis
      - minio
      - rabbitmq
    networks:
      - chat
    deploy:
      resources:
        limits:
          memory: 512M

  python-app:
    build: ./FoxChatRAG-python
    container_name: fox-python
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MYSQL__HOST=mysql
      - MYSQL__PORT=3306
      - MYSQL__USER=root
      - MYSQL__PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL__DATABASE=FoxChat
      - REDIS__HOST=redis
      - REDIS__PORT=6379
      - REDIS__PASSWORD=${REDIS_PASSWORD:-}
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USER=${RABBIT_USER:-admin}
      - RABBITMQ__PASSWORD=${RABBIT_PASSWORD:-admin}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - SERVER__PORT=8000
      - TZ=Asia/Shanghai
      - KEY__DS_MODEL=${KEY__DS_MODEL:-}
      - KEY__KIMI_MODEL=${KEY__KIMI_MODEL:-}
      - KEY__QWEN_MODEL=${KEY__QWEN_MODEL:-}
      - KEY__MiniMax_MODEL=${KEY__MiniMax_MODEL:-}
      - KEY__ASTRON_MODEL=${KEY__ASTRON_MODEL:-}
      - OLLAMA__BASE_URL=http://ollama:11434
      - OLLAMA__EMBEDDING_MODEL=quentinz/bge-small-zh-v1.5
      - MODEL__DEFAULT_LLM=${MODEL__DEFAULT_LLM:-astron_model}
      - MODEL__DEFAULT_JSON_LLM=${MODEL__DEFAULT_JSON_LLM:-astron_json_model}
      - MODEL__DEFAULT_EMBEDDING=ollama
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - chromadb
      - ollama
    networks:
      - chat
    deploy:
      resources:
        limits:
          memory: 64M

  vue-nginx:
    build: ./FoxChat-vue
    container_name: fox-vue
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - java-app
    networks:
      - chat
    deploy:
      resources:
        limits:
          memory: 32M

networks:
  chat:
    driver: bridge