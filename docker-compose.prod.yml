# ============================================
# FoxChat Production Docker Compose (中间件已迁出)
# 一键启动：docker compose -f docker-compose.prod.yml --env-file /root/home/docker-manager/.env up -d
#
# 中间件 (mysql/redis/minio/rabbitmq/chromadb) 已迁至本机 WSL
# 通过 frp 隧道连接 — 所有中间件地址指向 host.docker.internal
# ============================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"

services:
  # ============================================
  # Application Services
  # ============================================
  java-app:
    build: ./FoxChat-java
    container_name: fox-java
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "12000:12000"
      - "13000:13000"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:13306/FoxChat
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_DATA_REDIS_HOST=host.docker.internal
      - SPRING_DATA_REDIS_PORT=16379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SPRING_RABBITMQ_HOST=host.docker.internal
      - SPRING_RABBITMQ_PORT=15672
      - SPRING_RABBITMQ_USERNAME=${RABBIT_USER:-admin}
      - SPRING_RABBITMQ_PASSWORD=${RABBIT_PASSWORD:-admin}
      - MINIO_ENDPOINT=http://host.docker.internal:19000
      - MINIO_PUBLIC_ENDPOINT=http://${SERVER_IP}:19000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - RAG_SERVICE_URL=http://python-app:8000
      - SPRING_PROFILES_ACTIVE=prod
      - FOX_JWT_SECRET=${FOX_JWT_SECRET}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - TZ=Asia/Shanghai
    networks:
      - chat
    deploy:
      resources:
        limits:
          memory: 512M

  python-app:
    build: ./FoxChatRAG-python
    container_name: fox-python
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    environment:
      - MYSQL__HOST=host.docker.internal
      - MYSQL__PORT=13306
      - MYSQL__USER=root
      - MYSQL__PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL__DATABASE=FoxChat
      - REDIS__HOST=host.docker.internal
      - REDIS__PORT=16379
      - REDIS__PASSWORD=${REDIS_PASSWORD:-}
      - RABBITMQ__HOST=host.docker.internal
      - RABBITMQ__PORT=15672
      - RABBITMQ__USER=${RABBIT_USER:-admin}
      - RABBITMQ__PASSWORD=${RABBIT_PASSWORD:-admin}
      - CHROMA__HOST=host.docker.internal
      - CHROMA__PORT=18000
      - SERVER__PORT=8000
      - TZ=Asia/Shanghai
      - KEY__QWEN_MODEL=${KEY__QWEN_MODEL:-}
      - MODEL__DEFAULT_LLM=${MODEL__DEFAULT_LLM:-astron_model}
      - MODEL__DEFAULT_JSON_LLM=${MODEL__DEFAULT_JSON_LLM:-astron_json_model}
      - MODEL__DEFAULT_EMBEDDING=dashscope
    networks:
      - chat
    deploy:
      resources:
        limits:
          memory: 450M

  vue-nginx:
    build: ./FoxChat-vue
    container_name: fox-vue
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - java-app
    networks:
      - chat
    deploy:
      resources:
        limits:
          memory: 32M

networks:
  chat:
    driver: bridge
